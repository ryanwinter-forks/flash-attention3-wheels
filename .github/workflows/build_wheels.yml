name: Build Flash-Attention 3 Wheels

on:
  workflow_dispatch:
    inputs:
      cuda_versions:
        description: 'Comma-separated CUDA versions to build (e.g. "12.8,13.0"). Leave empty to use defaults.'
        required: false
        default: ''
      torch_versions:
        description: 'Comma-separated PyTorch versions to build (e.g. "2.8.0,2.11.0"). Leave empty to use defaults.'
        required: false
        default: ''
      jimver_cuda_toolkit_version:
        description: 'Jimver/cuda-toolkit action version tag to use for Windows builds (e.g. "v0.2.35"). Leave empty to use default.'
        required: false
        default: 'v0.2.35'

jobs:
  prepare-matrix:
    runs-on: ubuntu-latest
    outputs:
      win-matrix: ${{ steps.win.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - name: Generate Windows matrix
        id: win
        env:
          MATRIX_TARGET: windows
          CUDA_VERSIONS: ${{ inputs.cuda_versions }}
          TORCH_VERSIONS: ${{ inputs.torch_versions }}
          JIMVER_CUDA_TOOLKIT_VERSION: ${{ inputs.jimver_cuda_toolkit_version || 'v0.2.35'}}
        run: python scripts/generate_matrix.py

  build-win-wheels:
    needs: prepare-matrix
    runs-on: windows-latest
    timeout-minutes: 60
    strategy:
      max-parallel: 3
      fail-fast: false
      matrix: ${{fromJson(needs.prepare-matrix.outputs.win-matrix)}}

    steps:
      - name: Enable Windows long-path
        shell: pwsh
        run: |
          New-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" `
                           -Name "LongPathsEnabled" `
                           -Value 1 -PropertyType DWORD -Force
          git config --global core.longpaths true

      - uses: actions/checkout@v6
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Checkout Jimver/cuda-toolkit action
        uses: actions/checkout@v6
        with:
          repository: Jimver/cuda-toolkit
          ref: ${{ inputs.jimver_cuda_toolkit_version || 'v0.2.35' }}
          path: .jimver-cuda-toolkit

      - name: Install CUDA ${{ matrix.cuda }}
        uses: ./.jimver-cuda-toolkit
        with:
          cuda: ${{ matrix.cuda_full }}

      - name: Build wheel
        shell: pwsh
        run: |
          scripts/build_wheel.ps1 `
            -CudaVersion "${{ matrix.cuda }}" `
            -TorchVersion "${{ matrix.torch }}" `
            -MaxJobs 6

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v7
        with:
          name: wheel-win-cu${{ matrix.cuda }}-torch${{ matrix.torch }}
          path: C:\tmp\wheels\*.whl
          retention-days: 7

  create-release:
    needs: build-win-wheels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
      - run: |
          mkdir -p release-wheels
          find artifacts -name "*.whl" -exec cp {} release-wheels/ \;
          ls -lh release-wheels/
      - name: Generate tag
        id: tag
        run: |
          DATE_TAG=$(date +'%Y.%m.%d')
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "tag=${DATE_TAG}-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "date=${DATE_TAG}" >> $GITHUB_OUTPUT
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Flash-Attention 3 Wheels - ${{ steps.tag.outputs.date }}"
          body: |
            ## Flash-Attention 3 Pre-built Wheels
            **Build Date:** ${{ steps.tag.outputs.date }}
          files: release-wheels/*.whl
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ steps.tag.outputs.tag }}" \
             --draft=false --repo "${{ github.repository }}"
